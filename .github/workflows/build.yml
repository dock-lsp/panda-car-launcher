name: Android CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - debug
          - release

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  # ==================== Debug жЮДеїЇ ====================
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    if: github.event.inputs.build_type != 'release'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Debug APK to Release (on main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-release
          path: app/build/outputs/apk/debug/*.apk

  # ==================== Release жЮДеїЇ ====================
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.event.inputs.build_type != 'debug'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # е§ДзРЖз≠ЊеРНеѓЖйТ•
      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore/release.jks

      # е¶ВжЮЬж≤°жЬЙйЕНзљЃз≠ЊеРНеѓЖйТ•пЉМеИЫеїЇдЄАдЄ™дЄіжЧґзЪД debug з≠ЊеРН
      - name: Create debug signing config for release
        if: env.KEYSTORE_BASE64 == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          cp ~/.android/debug.keystore app/keystore/release.jks || true
          # дњЃжФє build.gradle дљњзФ® debug з≠ЊеРН
          sed -i 's/storePassword .*/storePassword '\''android'\''/' app/build.gradle || true
          sed -i 's/keyPassword .*/keyPassword '\''android'\''/' app/build.gradle || true

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  # ==================== еИЫеїЇ Release ====================
  create-release:
    name: Create GitHub Release
    needs: [build-debug, build-release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | sed 's/.*versionName[[:space:]]*["\x27]\([^"\x27]*\)["\x27].*/\1/')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | sed 's/.*versionCode[[:space:]]*\([0-9]*\).*/\1/')
          BUILD_DATE=$(date +'%Y%m%d')
          BUILD_TIME=$(date +'%H%M%S')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-${BUILD_DATE}.${BUILD_TIME}" >> $GITHUB_OUTPUT

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk-release
          path: artifacts/debug/

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: artifacts/release/

      - name: Rename APKs
        run: |
          cd artifacts/debug && mv *.apk PandaCarLauncher-debug-${{ steps.version.outputs.tag }}.apk || true
          cd ../release && mv *.apk PandaCarLauncher-release-${{ steps.version.outputs.tag }}.apk || true

      - name: Generate Changelog
        id: changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## рЯЪА зЖКзМЂиљ¶жЬЇж°МйЭҐ ${{ steps.version.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### рЯУ¶ жЮДеїЇдњ°жБѓ" >> $GITHUB_OUTPUT
          echo "- **зЙИжЬђ**: ${{ steps.version.outputs.version_name }} (Code: ${{ steps.version.outputs.version_code }})" >> $GITHUB_OUTPUT
          echo "- **жЮДеїЇжЧ•жЬЯ**: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "- **жПРдЇ§**: [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### рЯУ• дЄЛиљљ" >> $GITHUB_OUTPUT
          echo "| з±їеЮЛ | жЦЗдїґ | иѓіжШО |" >> $GITHUB_OUTPUT
          echo "|------|------|------|" >> $GITHUB_OUTPUT
          echo "| Debug | \`PandaCarLauncher-debug-${{ steps.version.outputs.tag }}.apk\` | еЉАеПСжµЛиѓХзЙИжЬђ |" >> $GITHUB_OUTPUT
          echo "| Release | \`PandaCarLauncher-release-${{ steps.version.outputs.tag }}.apk\` | ж≠£еЉПеПСеЄГзЙИжЬђ |" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "> рЯ§Ц зФ± GitHub Actions иЗ™еК®жЮДеїЇ" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "зЖКзМЂиљ¶жЬЇж°МйЭҐ ${{ steps.version.outputs.tag }}"
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            artifacts/debug/*.apk
            artifacts/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up old artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '30 days'
          skip-recent: 5
